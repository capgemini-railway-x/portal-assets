name: build

on:
  push:
  #    branches:
  #      - 'main'
  workflow_dispatch:

# Variables that need to be define in the GitHub repository:
# - AWS_ROLE_ARN: The ARN of the AWS IAM Role that has permissions to push to ECR
# - AWS_REGION: The AWS region where the ECR repository is located

jobs:
  build-and-push-image:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org/

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Install Dependencies
        run: yarn

      - name: Create metadata
        run: yarn build:release

      - name: Add content to Legal Notice
        run: yarn build:legal-notice

      - name: Build Application
        run: yarn build

      - name: Build, tag, and push docker image to Amazon ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ github.event.repository.name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:$IMAGE_TAG -f .conf/Dockerfile .
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
